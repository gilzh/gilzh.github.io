<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dr Gilles Daniel — Digital Business Card</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      padding: 20px;
    }

    .card {
      background: rgba(255, 255, 255, 0.05);
      backdrop-filter: blur(20px);
      border: 1px solid rgba(255, 255, 255, 0.12);
      border-radius: 24px;
      padding: 48px 40px 40px;
      max-width: 420px;
      width: 100%;
      text-align: center;
      box-shadow: 0 25px 60px rgba(0, 0, 0, 0.4);
    }

    .avatar {
      width: 100px;
      height: 100px;
      border-radius: 50%;
      margin: 0 auto 24px;
      border: 3px solid #e2b96f;
      overflow: hidden;
      box-shadow: 0 4px 20px rgba(226, 185, 111, 0.3);
    }

    .avatar img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    .name {
      font-size: 1.75rem;
      font-weight: 700;
      color: #ffffff;
      margin-bottom: 6px;
      letter-spacing: -0.3px;
    }

    .divider {
      width: 40px;
      height: 3px;
      background: linear-gradient(90deg, #e2b96f, #c9913d);
      border-radius: 2px;
      margin: 16px auto 24px;
    }

    .contact-list {
      list-style: none;
      display: flex;
      flex-direction: column;
      gap: 14px;
      margin-bottom: 36px;
    }

    .contact-item {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      color: rgba(255, 255, 255, 0.75);
      font-size: 0.97rem;
    }

    .contact-item a {
      color: rgba(255, 255, 255, 0.85);
      text-decoration: none;
      transition: color 0.2s;
    }

    .contact-item a:hover {
      color: #e2b96f;
    }

    .icon {
      width: 36px;
      height: 36px;
      border-radius: 10px;
      background: rgba(255, 255, 255, 0.08);
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }

    .icon svg {
      width: 18px;
      height: 18px;
      fill: #e2b96f;
    }

    .btn {
      display: inline-block;
      width: 100%;
      padding: 15px 24px;
      background: linear-gradient(135deg, #e2b96f, #c9913d);
      color: #1a1a2e;
      font-size: 1rem;
      font-weight: 700;
      text-decoration: none;
      border-radius: 14px;
      transition: transform 0.15s, box-shadow 0.15s, opacity 0.15s;
      box-shadow: 0 6px 20px rgba(226, 185, 111, 0.35);
      letter-spacing: 0.2px;
    }

    .btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 10px 28px rgba(226, 185, 111, 0.45);
      opacity: 0.95;
    }

    .btn:active {
      transform: translateY(0);
    }

    .btn-icon {
      margin-right: 8px;
    }
  </style>
</head>
