  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: #eaeaea;
      color: #2c2c2c;
      min-height: 100vh;
      padding: 0 24px 48px 24px;
    }

    /* ── Language bar ── */
    .lang-bar {
      display: flex;
      justify-content: center;
      gap: 8px;
      padding: 10px 16px;
      background: #fff;
      border-bottom: 1px solid rgba(0,0,0,0.07);
      position: sticky;
      top: 0;
      z-index: 200;
    }

    .lang-btn {
      font-size: 1.6rem;
      background: none;
      border: 2px solid transparent;
      border-radius: 8px;
      padding: 4px 8px;
      cursor: pointer;
      line-height: 1;
      transition: border-color 0.15s, background 0.15s;
      user-select: none;
    }

    .lang-btn:hover    { background: #f0ebe0; }
    .lang-btn.active   { border-color: #c8880a; background: #fdf3dc; }

    /* ── Main content top padding ── */
    .page-content { padding-top: 24px; }

    h1 {
      text-align: center;
      font-size: 2.8rem;
      letter-spacing: 2px;
      margin-bottom: 8px;
      background: linear-gradient(135deg, #c8880a, #d64020, #1a5bbf);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .subtitle {
      text-align: center;
      color: #999;
      margin-bottom: 32px;
      font-size: 0.95rem;
    }

    /* ── Meetup card ── */
    .meetup {
      max-width: 900px;
      margin: 0 auto 48px;
      background: #fff;
      border: 1px solid rgba(0,0,0,0.07);
      border-radius: 14px;
      padding: 22px 24px;
      box-shadow: 0 2px 12px rgba(0,0,0,0.07);
      font-size: 0.92rem;
      line-height: 1.65;
      color: #555;
    }

    .meetup-title {
      font-size: 1.2rem;
      font-weight: 700;
      color: #d72b2b;
      margin-bottom: 8px;
    }

    .meetup p { margin-bottom: 8px; }
    .meetup p:last-child { margin-bottom: 0; }

    .meetup a {
      display: inline-block;
      margin-top: 10px;
      padding: 6px 14px;
      background: #fff;
      border: 1px solid #d72b2b;
      border-radius: 6px;
      color: #d72b2b;
      text-decoration: none;
      font-weight: 700;
      font-size: 0.8rem;
      transition: background 0.15s;
    }

    .meetup a:hover { background: #fdecea; }

    /* ── Tile strip ── */
    .tile-strip {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 8px;
      margin-bottom: 40px;
    }

    .tile {
      width: 52px;
      height: 68px;
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.4rem;
      font-weight: 900;
      background: #fff;
      box-shadow: 0 4px 0 rgba(0,0,0,0.18), inset 0 1px 0 rgba(255,255,255,0.8);
      cursor: default;
      transition: transform 0.15s, box-shadow 0.15s;
      user-select: none;
      border: 1.5px solid rgba(0,0,0,0.10);
    }

    .tile:hover {
      transform: translateY(-6px);
      box-shadow: 0 10px 0 rgba(0,0,0,0.14), inset 0 1px 0 rgba(255,255,255,0.8);
    }

    .tile.red    { color: #d72b2b; }
    .tile.blue   { color: #1a5bbf; }
    .tile.orange { color: #e06010; }
    .tile.black  { color: #222; }
    .tile.joker  {
      background: transparent;
      border: none;
      padding: 0;
      overflow: hidden;
    }

    /* ── Section headings ── */
    .section-heading {
      text-align: center;
      font-size: 1.3rem;
      letter-spacing: 1px;
      color: #d72b2b;
      margin-bottom: 20px;
      font-weight: 700;
    }

    /* ── Cards grid ── */
    .cards {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      gap: 16px;
      max-width: 900px;
      margin: 0 auto 40px;
    }

    .card {
      background: #fff;
      border-radius: 14px;
      padding: 22px;
      border: 1px solid rgba(0,0,0,0.07);
      box-shadow: 0 2px 12px rgba(0,0,0,0.07);
    }

    .card h2 {
      font-size: 1rem;
      font-weight: 700;
      margin-bottom: 12px;
      display: flex;
      align-items: center;
      gap: 10px;
      color: #1a1a1a;
    }

    .badge {
      display: inline-block;
      padding: 2px 10px;
      border-radius: 20px;
      font-size: 0.72rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      flex-shrink: 0;
    }

    .badge-goal   { background: #f0e6ff; color: #6a1fbf; border: 1px solid #c8a0f0; }
    .badge-run    { background: #deeaff; color: #1a4f9c; border: 1px solid #b0c8f0; }
    .badge-group  { background: #ffe0e0; color: #b02020; border: 1px solid #f0b0b0; }
    .badge-start  { background: #d8f5e4; color: #1a7a40; border: 1px solid #a0dbb8; }
    .badge-mini   { background: #fdecea; color: #d72b2b; border: 1px solid #f0b0b0; }

    .card-mini { border-color: rgba(0,0,0,0.07); background: #fff; }

    .rule-text {
      color: #555;
      line-height: 1.65;
      font-size: 0.92rem;
    }

    .rule-text strong { color: #222; }

    /* ── Example sets ── */
    .example {
      display: flex;
      gap: 6px;
      margin-top: 14px;
      flex-wrap: wrap;
      align-items: center;
    }

    .mini-tile {
      width: 36px;
      height: 48px;
      border-radius: 5px;
      background: #fff;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1rem;
      font-weight: 900;
      box-shadow: 0 3px 0 rgba(0,0,0,0.18);
      border: 1.5px solid rgba(0,0,0,0.10);
    }

    .mini-tile.red    { color: #d72b2b; }
    .mini-tile.blue   { color: #1a5bbf; }
    .mini-tile.orange { color: #e06010; }
    .mini-tile.black  { color: #222; }

    .mini-tile-sm {
      width: 24px;
      height: 32px;
      border-radius: 4px;
      background: #fff;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      font-size: 0.65rem;
      font-weight: 900;
      box-shadow: 0 2px 0 rgba(0,0,0,0.18);
      border: 1.5px solid rgba(0,0,0,0.10);
    }

    .mini-tile-sm.red    { color: #d72b2b; }
    .mini-tile-sm.blue   { color: #1a5bbf; }
    .mini-tile-sm.orange { color: #e06010; }
    .mini-tile-sm.black  { color: #222; }

    /* ── Photo gallery ── */
    .gallery-heading {
      text-align: center;
      font-size: 1.3rem;
      letter-spacing: 1px;
      color: #d72b2b;
      margin-bottom: 20px;
      font-weight: 700;
    }

    .gallery {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 14px;
      max-width: 900px;
      margin: 0 auto 48px;
    }

    .gallery a {
      display: block;
      border-radius: 12px;
      overflow: hidden;
      box-shadow: 0 3px 14px rgba(0,0,0,0.13);
      transition: transform 0.18s, box-shadow 0.18s;
      aspect-ratio: 4/3;
    }

    .gallery a:hover {
      transform: translateY(-4px);
      box-shadow: 0 8px 24px rgba(0,0,0,0.18);
    }

    .gallery img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    /* ── Footer ── */
    footer {
      text-align: center;
      color: #aaa;
      font-size: 0.8rem;
      margin-top: 8px;
    }

    footer a { color: #1a5bbf; text-decoration: none; }
    footer a:hover { text-decoration: underline; }

    /* ── Mobile ── */
    @media (max-width: 768px) {
      body { padding: 0 16px 48px; }

      h1 { font-size: 2rem; }

.cards { grid-template-columns: 1fr; }

      .gallery { grid-template-columns: 1fr; }

      .tile { width: 44px; height: 58px; font-size: 1.2rem; }
    }

    /* ── Tablet ── */
    @media (min-width: 769px) and (max-width: 1100px) {
      .gallery { grid-template-columns: repeat(2, 1fr); }
    }
  </style>
</head>

  function setLang(lang) {
    const dict = T[lang];
    document.querySelectorAll('[data-i18n]').forEach(el => {
      if (dict[el.dataset.i18n] !== undefined) el.textContent = dict[el.dataset.i18n];
    });
    document.querySelectorAll('[data-i18n-html]').forEach(el => {
      if (dict[el.dataset.i18nHtml] !== undefined) el.innerHTML = dict[el.dataset.i18nHtml];
    });
    document.querySelectorAll('.lang-btn').forEach(btn => btn.classList.remove('active'));
    document.querySelector(`.lang-btn[onclick="setLang('${lang}')"]`).classList.add('active');
    document.documentElement.lang = lang;
  }

  // Initialise with English
  setLang('en');
